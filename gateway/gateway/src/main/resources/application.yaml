server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:
        - id: catalogo
          uri: http://catalogo:8081
          predicates:
            - Path=/productos/**
          filters:
            - RewritePath=/productos/?(?<segment>.*), /api/v1/products/$\{segment\}

        - id: wishlist
          uri: http://wishlist:8082
          predicates:
            - Path=/wishlist/**
          filters:
            - RewritePath=/wishlist/?(?<segment>.*), /api/v1/wishList/$\{segment\}

        - id: notificaciones
          uri: http://notificaciones:8083
          predicates:
            - Path=/notificaciones/**
          filters:
            - RewritePath=/notificaciones/?(?<segment>.*), /api/v1/notificacion/$\{segment\}

        - id: auth
          uri: http://auth:8084
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth/?(?<segment>.*), /api/v1/auth/$\{segment\}

security:
  jwt:
    secret-key: WCrD7ZwsNH2yZx4d29X3522BEAYTjm7BiNJxi9xksjU=
